server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Microservizio Spring Boot (stesso path usato da environment.apiUrl, es. /api/backoffice-ms).
    # Evita che /api/backoffice-ms/... finisca su try_files → index.html (HTML al posto dell’immagine QR o JSON).
    # Nome host: Service K8s ms-gym-backoffice (vedi ms-gym-backoffice/k8s/base/service.yaml: srv-gym-investire-backoffice).
    upstream backoffice_ms {
        server srv-gym-investire-backoffice:8080;
    }

    location /api/backoffice-ms/ {
        proxy_pass http://backoffice_ms/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Accept-Encoding "";
    }

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # Angular SPA: tutte le route devono servire index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache per assets con hash nel nome
    location ~* \.(js|css|woff2?|ico|png|jpg|jpeg|gif|svg|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
